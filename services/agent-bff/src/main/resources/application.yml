server:
  port: ${AGENT_BFF_PORT:8084}
  shutdown: graceful

spring:
  application:
    name: agent-bff
  jackson:
    default-property-inclusion: non_null
  lifecycle:
    timeout-per-shutdown-phase: 15s

aikefu:
  # /v1/agent/_internal/* 端点共享 token;空表示放开(仅生产前内部网络默认放开亦可)
  internal-token: ${AGENT_BFF_INTERNAL_TOKEN:}
  routing-svc:
    url: ${ROUTING_SVC_URL:http://localhost:8083}
    timeout-ms: 2000
  session-svc:
    url: ${SESSION_SVC_URL:http://localhost:8081}
    timeout-ms: 3000
  kb-svc:
    url: ${KB_SVC_URL:http://localhost:8092}
    timeout-ms: 5000
  notify-svc:
    url: ${NOTIFY_SVC_URL:http://localhost:8082}
    timeout-ms: 3000
  audit-svc:
    url: ${AUDIT_SVC_URL:http://localhost:8085}
    timeout-ms: 1500
    enabled: ${AUDIT_ENABLED:true}
  report-svc:
    url: ${REPORT_SVC_URL:http://localhost:8089}
    timeout-ms: 2000
    enabled: ${REPORT_ENABLED:true}
  tool-svc:
    url: ${TOOL_SVC_URL:http://localhost:8087}
    timeout-ms: 5000
  gateway-ws:
    # 留空则关闭"坐席消息直推 C 端"功能;C 端仍能通过会话历史拉到回复
    url: ${GATEWAY_WS_URL:}
    internal-token: ${GATEWAY_INTERNAL_PUSH_TOKEN:}
    timeout-ms: 1500

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
