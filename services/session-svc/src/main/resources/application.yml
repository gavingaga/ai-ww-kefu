server:
  port: ${SESSION_SVC_PORT:8081}
  shutdown: graceful

spring:
  application:
    name: session-svc
  jackson:
    default-property-inclusion: non_null
  lifecycle:
    timeout-per-shutdown-phase: 15s
  # 默认未激活任何 profile,走内存仓储;启用 Mongo 时设 SPRING_PROFILES_ACTIVE=mongo
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

aikefu:
  session:
    # 仓储后端: memory(默认,内存)/ mongo(MongoDB)
    # 切换为 mongo 时需同时激活 spring.profiles.active=mongo
    store: ${SESSION_STORE:memory}
    history-page-size: 30
    max-pending-handoff-seconds: 180
