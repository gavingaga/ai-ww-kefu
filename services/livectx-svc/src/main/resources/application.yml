server:
  port: ${LIVECTX_PORT:8086}
  shutdown: graceful

spring:
  application:
    name: livectx-svc
  jackson:
    default-property-inclusion: non_null
  lifecycle:
    timeout-per-shutdown-phase: 15s

aikefu:
  livectx:
    # 内存 TTL(秒)— 客户端上报后多长时间内视为有效
    ttl-seconds: ${LIVECTX_TTL_SECONDS:120}
    # 最大记录数,超过按 LRU 淘汰
    max-entries: ${LIVECTX_MAX_ENTRIES:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
